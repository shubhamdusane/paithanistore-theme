name: Deploy to Staging
on:
  push:
    branches: [staging]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme
      - name: Deploy to Shopify Staging Theme
        run: |
          shopify theme push \
            --store=${{ secrets.SHOPIFY_STORE_URL }} \
            --password=${{ secrets.SHOPIFY_TOKEN }} \
            --theme-id=${{ secrets.SHOPIFY_STAGING_THEME_ID }} \
            --allow-live
